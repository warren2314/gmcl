version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.app
    env_file:
      - .env
    environment:
      - APP_HTTP_ADDR=:8080
      - DB_DSN=postgres://appuser:apppassword@db:5432/appdb?sslmode=disable
      - MIGRATE=1
      - MIGRATE_DIR=/migrations
      - SEED=1
      - APP_ENV=dev
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

  caddy:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - appnet

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppassword
      - POSTGRES_DB=appdb
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 2s
      timeout: 5s
      retries: 10

networks:
  appnet:
    driver: bridge

volumes:
  db_data:
  caddy_data:
  caddy_config:

