name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppassword
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U appuser -d appdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_DSN: postgres://appuser:apppassword@localhost:5432/appdb?sslmode=disable
      TEST_DB_DSN: postgres://appuser:apppassword@localhost:5432/appdb?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.12"

      - name: Install tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5432 -U appuser -d appdb && break
            sleep 3
          done

      - name: Run migrations
        run: |
          for migration in migrations/*.sql; do
            psql "$DB_DSN" -v ON_ERROR_STOP=1 -f "$migration"
          done

      - name: Run tests
        run: go test ./...

      - name: Run gosec
        # These rule families are the repository's explicit legacy baseline.
        # Gosec still fails this job for every unbaselined rule; remove entries
        # here as the existing findings are remediated.
        run: gosec -exclude=G104,G109,G115,G118,G120,G124,G304,G705,G706,G707,G710 ./...

      - name: Run govulncheck
        run: govulncheck ./...

  deploy-production:
    name: Deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure production SSH
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/gmcl
          chmod 600 ~/.ssh/gmcl
          printf '%s\n' "$PROD_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Deploy tested commit
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          DEPLOY_COMMIT: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/gmcl "$PROD_SSH_USER@$PROD_SSH_HOST" \
            "cd /opt/gmcl && git switch master && DEPLOY_COMMIT=$DEPLOY_COMMIT bash scripts/deploy.sh"

